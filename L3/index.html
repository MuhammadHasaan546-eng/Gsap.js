<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <title>Premium Custom Cursor with GSAP</title>
  </head>
  <body>
    <!-- Custom Cursor Elements -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div id="main">
      <!-- Navbar -->
      <nav>
        <div class="logo hover-target">ANTIGRAVITY</div>
        <div class="nav-links">
          <a href="#" class="hover-target">Work</a>
          <a href="#" class="hover-target">About</a>
          <a href="#" class="hover-target">Contact</a>
        </div>
      </nav>

      <!-- Hero Section -->
      <section class="hero">
        <h1 class="hover-target">INTERACTIVE<br><span class="gradient-text">EXPERIENCE</span></h1>
        <p>A sleek, lag-free custom cursor built with GSAP and CSS variables.</p>
        <button class="cta-button hover-target">Explore Project</button>
      </section>

      <!-- Decorative elements -->
      <div class="bg-glow"></div>
    </div>

    <!-- GSAP for smooth animations -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"
      integrity="sha512-16esztaSRplJROyqo/OEwybApPPYRL3HZsxRySy3ur30d36XXVEqEsFD+SPtmPRg/fbk5Rt6Jp3SjiaQvmFQyA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script src="script.js"></script>
  </body>
</html>
